# Nginx Security Hardening & Performance Configuration
# To be included or used as main nginx server block in production

# Rate limiting definition for API protection (defined in HTTP block)
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=5r/s;

server {
    listen 80;
    server_name healthygrains.com www.healthygrains.com;
    
    # Enforce SSL redirection
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name healthygrains.com www.healthygrains.com;

    # SSL Certificates (Mock paths for production)
    ssl_certificate /etc/letsencrypt/live/healthygrains.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/healthygrains.com/privkey.pem;

    # TLS 1.3 only configuration
    ssl_protocols TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256:TLS_AES_128_GCM_SHA256;

    # SSL Session Optimization
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # HSTS Configuration (preload, subdomains, 2 years)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Prevent Clickjacking
    add_header X-Frame-Options "DENY" always;

    # Prevent MIME Sniffing
    add_header X-Content-Type-Options "nosniff" always;

    # XSS Filter Header
    add_header X-XSS-Protection "1; mode=block" always;

    # Referrer Policy
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Content Security Policy (Hardened but allowing fonts/images)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://images.unsplash.com; connect-src 'self';" always;

    # Frontend Assets
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # API Proxy with Rate Limiting
    location /api/ {
        limit_req zone=api_limit burst=10 nodelay;
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Django Admin Portal
    location /admin/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Backend Static Files
    location /django_static/ {
        alias /app/staticfiles/;
    }

    # Backend Media Files
    location /media/ {
        alias /app/media/;
    }
}
