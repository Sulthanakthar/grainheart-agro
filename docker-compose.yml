version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: grain_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: grain_dealer_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: grain_redis
    restart: always
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend.Dockerfile
    container_name: grain_backend
    restart: always
    command: >
      sh -c "python manage.py collectstatic --noinput &&
             python manage.py migrate &&
             gunicorn --bind 0.0.0.0:8000 --workers 3 grain_dealer.wsgi:application"
    ports:
      - "8000:8000"
    environment:
      - DEBUG=False
      - SECRET_KEY=django-insecure-k3m#t_u%-r!d*@*!x*q%q)3@00x_7431=j-v9p$g$y=125-^j(
      - ALLOWED_HOSTS=backend,localhost,127.0.0.1
      - DATABASE_URL=mysql://root:root@db:3306/grain_dealer_db
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - CORS_ALLOWED_ORIGINS=http://localhost
    volumes:
      - django_staticfiles:/app/staticfiles
      - django_media:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  celery_worker:
    build:
      context: ./backend
      dockerfile: ../docker/backend.Dockerfile
    container_name: grain_celery
    restart: always
    command: celery -A grain_dealer worker --loglevel=info
    environment:
      - DEBUG=False
      - SECRET_KEY=django-insecure-k3m#t_u%-r!d*@*!x*q%q)3@00x_7431=j-v9p$g$y=125-^j(
      - ALLOWED_HOSTS=backend,localhost,127.0.0.1
      - DATABASE_URL=mysql://root:root@db:3306/grain_dealer_db
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend.Dockerfile
    container_name: grain_frontend
    restart: always
    ports:
      - "80:80"
    volumes:
      - django_staticfiles:/app/staticfiles:ro
      - django_media:/app/media:ro
    depends_on:
      - backend

volumes:
  mysql_data:
  django_staticfiles:
  django_media:
